title: MHASpread
description: >-
  A Stochastic Multiscale Model for Animal Disease Spread and Control —
  Machado Lab · NC State University
remote_theme: just-the-docs/just-the-docs

color_scheme: default

# ── Search ──────────────────────────────────────────────────────────────────
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# ── Navigation ───────────────────────────────────────────────────────────────
nav_sort: order

# ── Auxiliary links (top-right) ───────────────────────────────────────────────
aux_links:
  "GitHub":
    - "https://github.com/machado-lab/MHASPREAD-model"
aux_links_new_tab: true

# ── Heading anchors & back-to-top ─────────────────────────────────────────────
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

# ── Footer ────────────────────────────────────────────────────────────────────
footer_content: >-
  &copy; 2024 Machado Lab &middot; NC State University &middot;
  <a href="https://machado-lab.github.io/">machado-lab.github.io</a>

# ── Callouts ──────────────────────────────────────────────────────────────────
callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  highlight:
    color: green

# ── Markdown / Math ───────────────────────────────────────────────────────────
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM

highlighter: rouge

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:
  - jekyll-seo-tag
  - jekyll-include-cache

# ── MathJax (for formula rendering) ────────────────────────────────────────────
mathjax:
  version: 3
  config:
    tex:
      inlineMath: [['$', '$']]
      displayMath: [['$$', '$$']]
